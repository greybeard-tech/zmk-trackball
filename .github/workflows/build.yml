name: Build ZMK Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install west
        run: pip install west

      - name: Clone ZMK
        run: git clone https://github.com/zmkfirmware/zmk.git

      - name: Setup workspace
        run: |
          cd zmk
          west init -l app
          west update

      - name: Install Zephyr deps
        run: |
          sudo apt update
          sudo apt install -y \
            cmake ninja-build gperf \
            ccache dfu-util device-tree-compiler \
            wget python3-dev python3-pip \
            python3-setuptools python3-tk python3-wheel \
            xz-utils file make gcc gcc-multilib \
            g++-multilib libsdl2-dev libmagic1

      - name: Install Python deps
        run: pip install -r zmk/zephyr/scripts/requirements.txt

      - name: Build firmware
        run: |
          cd zmk
          west build -s app -b nice_nano -- -DZMK_CONFIG=../config

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: zmk/build/zephyr/zmk.uf2
``
